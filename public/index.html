<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dota 2 Pro Companion</title>
  
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/global/dota2_logo.png" alt="Dota 2 Logo" />
        <h1>Dota 2 Pro</h1>
      </div>

      <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar héroe..." />
        <button id="search-button"><i class="fas fa-search"></i></button>
      </div>
    </header>

    <div class="tabs">
      <div class="tab active" data-tab="heroes">Héroes</div>
      <div class="tab" data-tab="items">Objetos</div>
      <div class="tab" data-tab="patches">Parches</div>
    </div>

    <div class="content-grid">
      <div class="main-column">
        
        <div class="tab-content active" id="tab-heroes">
          <div id="heroes-filters" class="filters">
            <div class="stat-filters">
              <div class="stat-filter active" data-stat="str">Fuerza</div>
              <div class="stat-filter active" data-stat="agi">Agilidad</div>
              <div class="stat-filter active" data-stat="int">Inteligencia</div>
              <div class="stat-filter active" data-stat="universal">Universal</div>
            </div>
          </div>
          <div id="heroes-container" class="main-content">
            </div>
        </div>

        <div class="tab-content" id="tab-items">
          <div id="items-container" class="grid-list"></div>
        </div>

        <div class="tab-content" id="tab-patches">
          <div id="patches-container"></div>
        </div>
      </div>

      <div class="chat-container">
        <div class="chat-header">
          <div class="ai-avatar">IA</div>
          <div>
            <h3>Estratega de Dota</h3>
            <p>Consultas de items y counters</p>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages">
          <div class="message ai-message">
            ¡Hola! Soy tu asistente. Puedo darte **builds**, explicarte **habilidades** o sugerirte **counters**.
          </div>
        </div>

        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Escribe un mensaje..." />
          <button id="send-button"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
