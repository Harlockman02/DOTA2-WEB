<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Pro Companion</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo-area">
            <svg width="40" height="40" viewBox="0 0 512 512" class="nav-logo">
                <path fill="#e63946" d="M448 32H64C46.3 32 32 46.3 32 64v384c0 17.7 14.3 32 32 32h384c17.7 0 32-14.3 32-32V64c0-17.7-14.3-32-32-32zm-16 352H256V256h176v128zm0-160H256V80h160c8.8 0 16 7.2 16 16v128zM80 96c0-8.8 7.2-16 16-16h128v288H96c-8.8 0-16-7.2-16-16V96z"/>
            </svg>
            <h1>Dota 2 <span class="red">Pro</span></h1>
        </div>
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Buscar héroe...">
        </div>
    </header>

    <nav class="main-tabs">
        <button class="tab-btn active" id="btn-heroes">Héroes</button>
        <button class="tab-btn" id="btn-items">Objetos</button>
    </nav>

    <div id="filter-bar" class="filter-bar">
        <button class="stat-btn active" data-stat="str">Fuerza</button>
        <button class="stat-btn active" data-stat="agi">Agilidad</button>
        <button class="stat-btn active" data-stat="int">Inteligencia</button>
        <button class="stat-btn active" data-stat="all">Universal</button>
    </div>

    <main id="content-area" class="content-grid"></main>

    <button class="fab-chat" id="fab-open-chat">
        <i class="fas fa-comment-dots"></i>
    </button>

    <aside class="chat-overlay" id="chat-window">
        <div class="chat-header">
            <span>Analista IA Inmortal</span>
            <button id="chat-close-btn">&times;</button>
        </div>
        <div id="chat-messages" class="chat-body"></div>
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Pregunta algo...">
            <button id="send-button"><i class="fas fa-paper-plane"></i></button>
        </div>
    </aside>

    <script src="app.js"></script>
</body>
</html>
