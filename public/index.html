<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Pro Companion</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo-area">
            <img src="img/logo.svg" alt="Dota 2" class="nav-logo" onerror="this.src='https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/global/dota2_logo.png'">
            <h1>Dota 2 <span class="red">Pro</span></h1>
        </div>
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Buscar...">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <nav class="main-tabs">
        <button class="tab-btn active" onclick="switchTab('heroes')">Héroes</button>
        <button class="tab-btn" onclick="switchTab('items')">Objetos</button>
        <button class="tab-btn" onclick="switchTab('patches')">Parches</button>
    </nav>

    <div id="filter-bar" class="filter-bar">
        <button class="stat-btn active" data-stat="str">Fuerza</button>
        <button class="stat-btn active" data-stat="agi">Agilidad</button>
        <button class="stat-btn active" data-stat="int">Inteligencia</button>
        <button class="stat-btn active" data-stat="all">Universal</button>
    </div>

    <main id="content-area" class="content-grid"></main>

    <button class="fab-chat" id="fab-chat" onclick="toggleChat()">
        <i class="fas fa-comment-dots"></i>
    </button>

    <aside class="chat-overlay" id="chat-window">
        <div class="chat-header">
            <span>Analista IA Inmortal</span>
            <button class="close-btn" onclick="toggleChat()">&times;</button>
        </div>
        <div id="chat-messages" class="chat-body"></div>
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Escribe aquí...">
            <button id="send-button"><i class="fas fa-paper-plane"></i></button>
        </div>
    </aside>

    <script src="app.js"></script>
</body>
</html>
